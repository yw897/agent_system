<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🤖 Agent 系统 - 语音版</title>
    <style>
        /* 复用之前的样式，添加语音按钮样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            touch-action: manipulation;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            padding: 10px;
        }
        
        .header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 0.9em;
        }
        
        .chat-box {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            max-height: 60vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            -webkit-overflow-scrolling: touch;
        }
        
        .message {
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 12px;
            max-width: 85%;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 15px;
        }
        
        .user {
            background: #007bff;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        
        .assistant {
            background: #f1f3f4;
            color: #333;
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }
        
        .typing::after {
            content: '|';
            animation: blink 1s step-start infinite;
            color: #667eea;
            margin-left: 2px;
        }
        
        @keyframes blink {
            50% { opacity: 0; }
        }
        
        .input-area {
            background: white;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            gap: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: sticky;
            bottom: 10px;
            align-items: center;
        }
        
        #userInput {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            -webkit-appearance: none;
        }
        
        #userInput:focus {
            border-color: #667eea;
        }
        
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 50px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #sendBtn {
            background: #007bff;
            color: white;
        }
        
        #sendBtn:active {
            background: #0056b3;
            transform: scale(0.95);
        }
        
        /* ✨ 语音按钮样式 */
        #voiceBtn {
            background: #28a745;
            color: white;
            min-width: 50px;
        }
        
        #voiceBtn:active {
            background: #218838;
            transform: scale(0.95);
        }
        
        /* 录音中动画 */
        #voiceBtn.recording {
            background: #dc3545;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }
        
        #voiceBtn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
        
        #clearBtn {
            background: #6c757d;
            color: white;
        }
        
        #clearBtn:active {
            background: #545b62;
            transform: scale(0.95);
        }
        
        .loading {
            text-align: center;
            color: #666;
            padding: 10px;
        }
        
        .loading::after {
            content: '...';
            animation: dots 1.5s steps(5, end) infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        
        /* ✨ 语音状态提示 */
        .voice-status {
            text-align: center;
            color: white;
            padding: 5px;
            font-size: 0.9em;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .voice-status.visible {
            opacity: 1;
        }
        
        @media (max-width: 480px) {
            body { padding: 5px; }
            .header h1 { font-size: 1.5em; }
            .message { font-size: 14px; padding: 8px 12px; }
            .input-area { padding: 10px; }
            #userInput { font-size: 14px; padding: 10px; }
            button { padding: 10px 15px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Agent 系统</h1>
            <p>智能助手 | 支持语音输入 🎤</p>
        </div>
        
        <!-- ✨ 语音状态提示 -->
        <div class="voice-status" id="voiceStatus"></div>
        
        <div class="chat-box" id="chatBox">
            <div class="message assistant">
                你好！我是你的智能助手，点击麦克风按钮可以语音输入哦！
            </div>
        </div>
        
        <div class="input-area">
            <!-- ✨ 语音按钮 -->
            <button id="voiceBtn" onclick="toggleVoice()" title="语音输入">
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </button>
            
            <input 
                type="text" 
                id="userInput" 
                placeholder="输入消息或点击麦克风..." 
                onkeypress="if(event.key==='Enter') sendMessage()"
            >
            <button id="sendBtn" onclick="sendMessage()">发送</button>
            <button id="clearBtn" onclick="clearChat()">清空</button>
        </div>
    </div>
    
    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const voiceBtn = document.getElementById('voiceBtn');
        const voiceStatus = document.getElementById('voiceStatus');
        let isTyping = false;
        let isRecording = false;
        
        // ✨ 语音识别初始化
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'zh-CN';
            
            recognition.onstart = function() {
                isRecording = true;
                voiceBtn.classList.add('recording');
                showVoiceStatus('🎤 正在录音，请说话...');
            };
            
            recognition.onresult = function(event) {
                let interimTranscript = '';
                let finalTranscript = '';
                
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                
                if (finalTranscript) {
                    userInput.value = finalTranscript;
                    showVoiceStatus('✅ 识别完成：' + finalTranscript);
                    setTimeout(() => hideVoiceStatus(), 2000);
                } else if (interimTranscript) {
                    userInput.value = interimTranscript;
                }
            };
            
            recognition.onerror = function(event) {
                console.error('语音识别错误:', event.error);
                showVoiceStatus('❌ 识别失败：' + event.error);
                setTimeout(() => hideVoiceStatus(), 3000);
                stopRecording();
            };
            
            recognition.onend = function() {
                stopRecording();
            };
        } else {
            // 浏览器不支持
            voiceBtn.style.display = 'none';
            console.log('浏览器不支持语音识别');
        }
        
        function toggleVoice() {
            if (!recognition) {
                alert('❌ 您的浏览器不支持语音识别，请使用 Chrome 或 Edge 浏览器');
                return;
            }
            
            if (isRecording) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }
        
        function stopRecording() {
            isRecording = false;
            voiceBtn.classList.remove('recording');
        }
        
        function showVoiceStatus(message) {
            voiceStatus.textContent = message;
            voiceStatus.classList.add('visible');
        }
        
        function hideVoiceStatus() {
            voiceStatus.classList.remove('visible');
        }
        
        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.textContent = content;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        function typeMessage(content, callback) {
            const div = document.createElement('div');
            div.className = 'message assistant typing';
            chatBox.appendChild(div);
            
            let i = 0;
            const speed = 30;
            
            function type() {
                if (i < content.length) {
                    div.textContent += content.charAt(i);
                    i++;
                    chatBox.scrollTop = chatBox.scrollHeight;
                    setTimeout(type, speed);
                } else {
                    div.classList.remove('typing');
                    if (callback) callback();
                }
            }
            
            type();
        }
        
        function showLoading() {
            const div = document.createElement('div');
            div.className = 'loading';
            div.id = 'loading';
            div.textContent = 'AI 思考中';
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        function hideLoading() {
            const loading = document.getElementById('loading');
            if (loading) {
                loading.remove();
            }
        }
        
        async function sendMessage() {
            if (isTyping) return;
            
            const message = userInput.value.trim();
            if (!message) return;
            
            appendMessage('user', message);
            userInput.value = '';
            showLoading();
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: message})
                });
                
                const data = await response.json();
                hideLoading();
                
                isTyping = true;
                typeMessage(data.response, () => {
                    isTyping = false;
                });
                
            } catch (error) {
                hideLoading();
                appendMessage('assistant', '❌ 请求失败：' + error.message);
            }
        }
        
        async function clearChat() {
            try {
                await fetch('/clear', {method: 'POST'});
                chatBox.innerHTML = '<div class="message assistant">对话历史已清空，有什么可以帮你的吗？</div>';
            } catch (error) {
                alert('清空失败：' + error.message);
            }
        }
        
        window.addEventListener('load', () => {
            userInput.focus();
        });
    </script>
</body>
</html>
